# Pipeline créé par Mohamed KHEMAISSIA - Examen Esprit Arctic2025

trigger:
  - main

pool:
  vmImage: ubuntu-latest

steps:
  - task: NodeTool@0
    inputs:
      versionSpec: '20.x'
    displayName: 'Install Node.js'

  - script: |
      cd angular-app-kubernetes
      npm ci
      npm run build -- --configuration production
    displayName: 'Install dependencies and build Angular app'

  - task: PublishBuildArtifacts@1
    inputs:
      PathtoPublish: 'angular-app-kubernetes/dist/angular-app-kubernetes'
      ArtifactName: 'angular-build-dist'
      publishLocation: 'Container'
    displayName: 'Publier le build Angular comme artefact'