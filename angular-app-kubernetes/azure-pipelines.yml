trigger:
  - main

pool:
  vmImage: ubuntu-latest

steps:
  # 1. Spécifier la version de Java avant tout le reste
  - task: JavaToolInstaller@0
    inputs:
      versionSpec: '17'
      jdkArchitectureOption: 'x64'
      jdkSourceOption: 'PreInstalled'
    displayName: 'Installer Java 17'

  - task: NodeTool@0
    inputs:
      versionSpec: '16.x'
    displayName: 'Install Node.js'

  - task: SonarCloudPrepare@3
    inputs:
      SonarCloud: 'SonarQube Cloud service'
      organization: 'mohamedkhemaissia'
      scannerMode: 'CLI'
      configMode: 'manual'
      cliProjectKey: 'mohamedkhemaissia_DevopsJava'
      cliProjectName: 'DevopsJava Angular'
      cliSources: 'angular-app-kubernetes'
    displayName: 'Préparer SonarCloud'

  - script: |
      cd angular-app-kubernetes
      npm ci
    displayName: 'Install dependencies'

  - task: SonarCloudAnalyze@3
    displayName: 'Analyser avec SonarCloud'

  - task: SonarCloudPublish@3
    inputs:
      pollingTimeoutSec: '300'
    displayName: 'Publier résultats SonarCloud'

  - script: |
      cd angular-app-kubernetes
      npm run build -- --configuration production
    displayName: 'Build Angular app'

  - task: PublishBuildArtifacts@1
    inputs:
      PathtoPublish: 'angular-app-kubernetes/dist/angular-app'
      ArtifactName: 'angular-build-dist'
      publishLocation: 'Container'
    displayName: 'Publier le build Angular comme artefact'