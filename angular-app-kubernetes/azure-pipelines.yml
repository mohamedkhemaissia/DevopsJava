trigger:
- main

pool:
  vmImage: 'ubuntu-latest'   # ← agent gratuit d'Azure (pas ton agent local)

steps:
- checkout: self

- task: Docker@2
  displayName: 'Build & push vers Docker Hub'
  inputs:
    containerRegistry: 'docker-hub-mohamed'
    repository: 'medkhem1990/mohamedkhemaissia'
    command: 'buildAndPush'
    Dockerfile: '**/Dockerfile'
    tags: '$(Build.BuildId), latest'

- script: |
    echo "Pipeline terminé !"
    
  displayName: 'Instruction finale'
