trigger:
- main  # ou 'master' selon le nom de ta branche

pool:
  vmImage: 'ubuntu-latest'

steps:
- task: NodeTool@0
  inputs:
    versionSpec: '10.x'
  displayName: 'Install Node.js'

- script: |
    npm install --legacy-peer-deps
    npm run build --prod
  displayName: 'npm install and build'

- task: Docker@2
  displayName: 'Build and Push Docker Image'
  inputs:
    command: 'build'
    dockerfile: '**/Dockerfile'
    tags: |
      $(Build.BuildId)
      latest